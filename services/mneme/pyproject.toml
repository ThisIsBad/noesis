[project]
name = "mneme"
version = "0.1.0"
description = "Persistent episodic and semantic memory for the Noesis AGI stack"
requires-python = ">=3.11"
dependencies = [
    "noesis-schemas @ file://../../schemas",
    "fastapi>=0.111",
    "uvicorn>=0.30",
    "chromadb>=0.5",
    "mcp>=1.0",
    "pydantic>=2.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/mneme"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "../../schemas/src"]

[tool.coverage.run]
source = ["mneme.core"]

[tool.coverage.report]
fail_under = 85

[tool.mypy]
strict = true

[tool.ruff.lint]
select = ["E", "F", "I"]
