name: empiria

on:
  push:
    branches: [master]
    paths:
      - "services/empiria/**"
      - "schemas/**"
      - "kairos/**"
      - ".github/workflows/empiria.yml"
  pull_request:
    paths:
      - "services/empiria/**"
      - "schemas/**"
      - "kairos/**"
      - ".github/workflows/empiria.yml"

defaults:
  run:
    working-directory: services/empiria

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            kairos/pyproject.toml
            services/empiria/pyproject.toml

      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install empiria + dev deps
        run: pip install -e ".[dev]"

      - name: pytest + coverage
        run: |
          python -m pytest \
            --cov=empiria.core \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            kairos/pyproject.toml
            services/empiria/pyproject.toml

      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install empiria
        run: pip install -e .

      - name: Install lint tools
        run: pip install ruff mypy

      - name: ruff
        run: python -m ruff check src/ tests/

      - name: mypy
        run: python -m mypy --strict src/

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    # Build context = repo root; validates Dockerfile + schemas COPY
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          docker build \
            -f services/empiria/Dockerfile \
            -t empiria:ci \
            .
