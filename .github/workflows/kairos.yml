name: kairos

# Kairos is load-bearing for every service (tracing + span store). Run its
# gates independently so cross-cutting regressions surface immediately, not
# only through a downstream service workflow.

on:
  push:
    branches: [master]
    paths:
      - "kairos/**"
      - "schemas/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/kairos.yml"
  pull_request:
    paths:
      - "kairos/**"
      - "schemas/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/kairos.yml"

jobs:
  ci:
    uses: ./.github/workflows/_python-component.yml
    with:
      service-path: kairos
      service-name: kairos
      coverage-args: "--cov=kairos"
      needs-kairos: false           # we ARE kairos
      has-docker: false             # kairos doesn't ship a Dockerfile
