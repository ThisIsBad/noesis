name: eval

on:
  push:
    branches: [master]
    paths:
      - "eval/**"
      - "schemas/**"
      - "kairos/**"
      - "services/praxis/**"
      - ".github/workflows/eval.yml"
  pull_request:
    paths:
      - "eval/**"
      - "schemas/**"
      - "kairos/**"
      - "services/praxis/**"
      - ".github/workflows/eval.yml"

defaults:
  run:
    working-directory: eval

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            eval/pyproject.toml

      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install praxis (PraxisCorePlanner adapter test)
        working-directory: services/praxis
        run: pip install -e .

      - name: Install eval
        run: pip install -e .

      - name: pytest (unit only — integration jobs need deployed services)
        run: python -m pytest -m unit -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            eval/pyproject.toml

      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install praxis
        working-directory: services/praxis
        run: pip install -e .

      - name: Install eval
        run: pip install -e .

      - name: Install lint tools
        run: pip install ruff mypy

      - name: ruff
        run: python -m ruff check src/ tests/

      - name: mypy
        run: python -m mypy --strict src/
