name: eval

on:
  push:
    branches: [master]
    paths:
      - "eval/**"
      - "schemas/**"
      - "kairos/**"
      - "services/praxis/**"
      - ".github/workflows/eval.yml"
  pull_request:
    paths:
      - "eval/**"
      - "schemas/**"
      - "kairos/**"
      - "services/praxis/**"
      - ".github/workflows/eval.yml"

defaults:
  run:
    working-directory: eval

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            eval/pyproject.toml

      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install praxis (PraxisCorePlanner adapter test)
        working-directory: services/praxis
        run: pip install -e .

      - name: Install eval
        run: pip install -e .

      - name: pytest (unit only — integration jobs need deployed services)
        run: python -m pytest -m unit -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            eval/pyproject.toml

      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install praxis
        working-directory: services/praxis
        run: pip install -e .

      - name: Install eval
        run: pip install -e .

      - name: Install lint tools
        run: pip install ruff mypy

      - name: ruff
        run: python -m ruff check src/ tests/

      - name: mypy
        run: python -m mypy --strict src/

  integration:
    name: Integration (deployed services)
    runs-on: ubuntu-latest
    # Skip on fork PRs — they can't see repo secrets.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            eval/pyproject.toml

      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install eval
        working-directory: eval
        run: pip install -e .

      - name: pytest integration
        id: integration
        working-directory: eval
        env:
          NOESIS_MNEME_URL: ${{ secrets.NOESIS_MNEME_URL }}
          NOESIS_MNEME_SECRET: ${{ secrets.NOESIS_MNEME_SECRET }}
          NOESIS_TELOS_URL: ${{ secrets.NOESIS_TELOS_URL }}
          NOESIS_TELOS_SECRET: ${{ secrets.NOESIS_TELOS_SECRET }}
          NOESIS_PRAXIS_URL: ${{ secrets.NOESIS_PRAXIS_URL }}
          NOESIS_PRAXIS_SECRET: ${{ secrets.NOESIS_PRAXIS_SECRET }}
          NOESIS_LOGOS_URL: ${{ secrets.NOESIS_LOGOS_URL }}
          NOESIS_LOGOS_SECRET: ${{ secrets.NOESIS_LOGOS_SECRET }}
          NOESIS_EPISTEME_URL: ${{ secrets.NOESIS_EPISTEME_URL }}
          NOESIS_EPISTEME_SECRET: ${{ secrets.NOESIS_EPISTEME_SECRET }}
          NOESIS_EMPIRIA_URL: ${{ secrets.NOESIS_EMPIRIA_URL }}
          NOESIS_EMPIRIA_SECRET: ${{ secrets.NOESIS_EMPIRIA_SECRET }}
          NOESIS_TECHNE_URL: ${{ secrets.NOESIS_TECHNE_URL }}
          NOESIS_TECHNE_SECRET: ${{ secrets.NOESIS_TECHNE_SECRET }}
          NOESIS_KOSMOS_URL: ${{ secrets.NOESIS_KOSMOS_URL }}
          NOESIS_KOSMOS_SECRET: ${{ secrets.NOESIS_KOSMOS_SECRET }}
        run: |
          set -o pipefail
          python -m pytest -m integration -v 2>&1 | tee pytest-output.txt

      - name: Post pytest output on failure
        if: failure() && github.event_name == 'pull_request' && steps.integration.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const full = fs.readFileSync('eval/pytest-output.txt', 'utf8');
            // GitHub comment cap is 65_536 chars; keep a safety margin
            // and prefer the tail, which is where pytest's FAILED section lives.
            const MAX = 60000;
            const body = full.length > MAX
              ? '…(truncated — showing last ' + MAX + ' chars)…\n\n' + full.slice(-MAX)
              : full;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Integration CI failure — `pytest -m integration -v`\n\n'
                + '<details><summary>pytest output</summary>\n\n```\n'
                + body
                + '\n```\n</details>',
            });
