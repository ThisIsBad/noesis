name: ab

# Canonical A/B (mcp-treatment vs. mcp-baseline) on demand.
#
# This workflow is the "does Noesis actually help?" measurement
# pipeline. It's manual (workflow_dispatch only) because each run
# burns Anthropic API budget — turning it on per-PR would cost
# real money on every CI cycle. Trigger from the Actions tab when
# you want a fresh number.
#
# Required repo secrets:
#   ANTHROPIC_API_KEY   — claude-agent-sdk inherits this; without
#                         it the spawned `claude` CLI subprocess
#                         can't authenticate and treatment fails.
#   NOESIS_<SVC>_URL    — same envelope as the integration job.
#   NOESIS_<SVC>_SECRET   The treatment side's MCP servers can't
#                         reach Noesis without these.
#
# Outputs:
#   - One JSONL per agent + a delta.json (the SuiteDelta summary).
#   - All three uploaded as the `ab-run-${{ run number }}` artifact.
#   - The SuiteDelta is also rendered into the workflow run summary
#     so you don't have to download anything to read the headline.

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Task suite (default | stage3)"
        required: true
        default: "stage3"
        type: choice
        options: ["default", "stage3"]
      samples:
        description: "Replays per task per side"
        required: true
        default: "3"
        type: string
      treatment:
        description: "Treatment agent name"
        required: true
        default: "mcp-treatment"
        type: string
      baseline:
        description: "Baseline agent name"
        required: true
        default: "mcp-baseline"
        type: string

defaults:
  run:
    working-directory: eval

jobs:
  ab:
    name: A/B (${{ inputs.treatment }} vs ${{ inputs.baseline }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            kairos/pyproject.toml
            services/praxis/pyproject.toml
            eval/pyproject.toml

      - name: Install schemas / kairos / praxis / eval
        run: |
          pip install -e ../schemas
          pip install -e ../kairos
          pip install -e ../services/praxis
          pip install -e .

      # The claude-agent-sdk spawns the `claude` CLI as a subprocess.
      # The published @anthropic-ai/claude-code package on npm is the
      # supported way to get the binary on PATH in CI.
      - name: Install Claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          which claude
          claude --version

      - name: Refuse to run without ANTHROPIC_API_KEY
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "ANTHROPIC_API_KEY secret is unset — the canonical A/B"
          echo "needs a real Anthropic credential. Add the secret in"
          echo "Settings → Secrets → Actions, then re-run."
          exit 1

      - name: Run A/B
        id: ab
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOESIS_MNEME_URL: ${{ secrets.NOESIS_MNEME_URL }}
          NOESIS_MNEME_SECRET: ${{ secrets.NOESIS_MNEME_SECRET }}
          NOESIS_TELOS_URL: ${{ secrets.NOESIS_TELOS_URL }}
          NOESIS_TELOS_SECRET: ${{ secrets.NOESIS_TELOS_SECRET }}
          NOESIS_PRAXIS_URL: ${{ secrets.NOESIS_PRAXIS_URL }}
          NOESIS_PRAXIS_SECRET: ${{ secrets.NOESIS_PRAXIS_SECRET }}
          NOESIS_LOGOS_URL: ${{ secrets.NOESIS_LOGOS_URL }}
          NOESIS_LOGOS_SECRET: ${{ secrets.NOESIS_LOGOS_SECRET }}
          NOESIS_EPISTEME_URL: ${{ secrets.NOESIS_EPISTEME_URL }}
          NOESIS_EPISTEME_SECRET: ${{ secrets.NOESIS_EPISTEME_SECRET }}
          NOESIS_EMPIRIA_URL: ${{ secrets.NOESIS_EMPIRIA_URL }}
          NOESIS_EMPIRIA_SECRET: ${{ secrets.NOESIS_EMPIRIA_SECRET }}
          NOESIS_TECHNE_URL: ${{ secrets.NOESIS_TECHNE_URL }}
          NOESIS_TECHNE_SECRET: ${{ secrets.NOESIS_TECHNE_SECRET }}
          NOESIS_KOSMOS_URL: ${{ secrets.NOESIS_KOSMOS_URL }}
          NOESIS_KOSMOS_SECRET: ${{ secrets.NOESIS_KOSMOS_SECRET }}
        run: |
          set -o pipefail
          mkdir -p ab-runs
          python -m noesis_eval.ab ab \
            --treatment "${{ inputs.treatment }}" \
            --baseline  "${{ inputs.baseline }}" \
            --suite     "${{ inputs.suite }}" \
            --samples   "${{ inputs.samples }}" \
            --out-dir   "ab-runs/run-${{ github.run_number }}" \
            2>&1 | tee ab-runs/run-${{ github.run_number }}/ab.log

      - name: Render SuiteDelta to step summary
        if: always() && hashFiles('eval/ab-runs/run-${{ github.run_number }}/delta.json') != ''
        run: |
          {
            echo "## Canonical A/B verdict"
            echo ""
            echo "**Suite:** \`${{ inputs.suite }}\` · **Samples:** \`${{ inputs.samples }}\` · **Treatment:** \`${{ inputs.treatment }}\` · **Baseline:** \`${{ inputs.baseline }}\`"
            echo ""
            echo '```json'
            cat "ab-runs/run-${{ github.run_number }}/delta.json"
            echo '```'
            echo ""
            echo "### Tail of run log"
            echo '```'
            tail -n 30 "ab-runs/run-${{ github.run_number }}/ab.log" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload A/B artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ab-run-${{ github.run_number }}
          path: |
            eval/ab-runs/run-${{ github.run_number }}/
          retention-days: 30
