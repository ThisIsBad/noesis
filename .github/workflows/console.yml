name: console

on:
  push:
    branches: [master]
    paths:
      - "services/console/**"
      - "ui/console/**"
      - "schemas/**"
      - "kairos/**"
      - "clients/**"
      - "ui/theoria/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/console.yml"
  pull_request:
    paths:
      - "services/console/**"
      - "ui/console/**"
      - "schemas/**"
      - "kairos/**"
      - "clients/**"
      - "ui/theoria/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/console.yml"

jobs:
  ci:
    uses: ./.github/workflows/_python-component.yml
    with:
      service-path: services/console
      service-name: console
      # mcp_server_http is exercised by eval/tests/test_console_inprocess.py
      # (HTTP layer round-trip via httpx.AsyncClient + ASGITransport), not
      # by Console's own unit suite — the unit suite covers
      # streaming_agent, trace_builder, sessions, and auth wiring.
      coverage-args: "--cov=console.streaming_agent --cov=console.trace_builder --cov=console.sessions"
      needs-clients: true
      # Console imports theoria.models for the DecisionTrace schema.
      # The other services don't, so this isn't in the reusable workflow's
      # default install list — Console pulls Theoria's source onto the
      # PYTHONPATH explicitly via its pyproject.toml [tool.pytest.ini_options].
      pytest-extra: ""
