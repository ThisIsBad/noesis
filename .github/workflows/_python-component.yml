name: _python-component

# Reusable preflight gates for any Python component in the monorepo.
# Each per-component workflow (logos.yml, mneme.yml, kairos.yml, ...) is
# a thin caller of this one. Replaces ~120 lines of duplication per
# service with a 25-line caller.
#
# Inputs:
#   service-path     repo-relative dir, e.g. "services/mneme" or "kairos"
#   service-name     human label + cache key, e.g. "mneme"
#   coverage-args    pytest coverage args. Default uses pyproject config.
#                    Examples: "--cov=mneme.core" "--cov=src/theoria"
#   needs-schemas    pip install -e schemas/  before the component
#   needs-kairos     pip install -e kairos/   before the component
#   needs-clients    pip install -e clients/  before the component
#   has-docker       run a `docker build` job against the component's
#                    Dockerfile (build context = repo root)
#   pytest-extra     extra args appended to the pytest invocation, e.g.
#                    "--ignore=tests/test_frontend.py" for theoria
#   python-versions  JSON array of Python versions, default 3.11 + 3.12

on:
  workflow_call:
    inputs:
      service-path:
        type: string
        required: true
      service-name:
        type: string
        required: true
      coverage-args:
        type: string
        default: "--cov"
      needs-schemas:
        type: boolean
        default: true
      needs-kairos:
        type: boolean
        default: true
      needs-clients:
        type: boolean
        default: false
      has-docker:
        type: boolean
        default: true
      pytest-extra:
        type: string
        default: ""
      coverage-fail-under:
        type: string
        default: "85"
      python-versions:
        type: string
        default: '["3.11", "3.12"]'

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          # Cache dependencies based on the dependency-graph pyprojects.
          # Conservative — the cache key includes everything that could
          # plausibly affect installed packages.
          cache-dependency-path: |
            schemas/pyproject.toml
            kairos/pyproject.toml
            clients/pyproject.toml
            ${{ inputs.service-path }}/pyproject.toml

      - name: Install schemas
        if: inputs.needs-schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        if: inputs.needs-kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install noesis-clients
        if: inputs.needs-clients
        working-directory: clients
        run: pip install -e .

      - name: Install ${{ inputs.service-name }} + dev deps
        working-directory: ${{ inputs.service-path }}
        run: pip install -e ".[dev]"

      - name: pytest + coverage
        working-directory: ${{ inputs.service-path }}
        run: |
          python -m pytest \
            ${{ inputs.coverage-args }} \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage-fail-under }} \
            ${{ inputs.pytest-extra }} \
            -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            kairos/pyproject.toml
            clients/pyproject.toml
            ${{ inputs.service-path }}/pyproject.toml

      - name: Install schemas
        if: inputs.needs-schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        if: inputs.needs-kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install noesis-clients
        if: inputs.needs-clients
        working-directory: clients
        run: pip install -e .

      - name: Install ${{ inputs.service-name }}
        working-directory: ${{ inputs.service-path }}
        run: pip install -e .

      - name: Install lint tools
        run: pip install ruff mypy

      - name: ruff
        working-directory: ${{ inputs.service-path }}
        run: python -m ruff check src/ tests/

      - name: mypy
        working-directory: ${{ inputs.service-path }}
        run: python -m mypy --strict src/

  docker:
    name: Docker build
    if: inputs.has-docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          docker build \
            -f ${{ inputs.service-path }}/Dockerfile \
            -t ${{ inputs.service-name }}:ci \
            .
