name: episteme

on:
  push:
    branches: [master]
    paths:
      - "services/episteme/**"
      - "schemas/**"
      - "kairos/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/episteme.yml"
  pull_request:
    paths:
      - "services/episteme/**"
      - "schemas/**"
      - "kairos/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/episteme.yml"

jobs:
  ci:
    uses: ./.github/workflows/_python-component.yml
    with:
      service-path: services/episteme
      service-name: episteme
      coverage-args: "--cov=episteme.core"
