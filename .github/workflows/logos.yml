name: logos

on:
  push:
    branches: [master]
    paths:
      - "services/logos/**"
      - "schemas/**"
      - "kairos/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/logos.yml"
  pull_request:
    paths:
      - "services/logos/**"
      - "schemas/**"
      - "kairos/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/logos.yml"

jobs:
  ci:
    uses: ./.github/workflows/_python-component.yml
    with:
      service-path: services/logos
      service-name: logos
      # Logos defines coverage targets in pyproject ([tool.coverage.run]),
      # so the bare `--cov` flag from the reusable default is correct.
      # Lean integration tests are excluded from coverage via the same
      # pyproject config and skipped at runtime when Lean isn't installed.
