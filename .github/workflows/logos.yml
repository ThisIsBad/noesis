name: logos

on:
  push:
    branches: [master]
    paths:
      - "services/logos/**"
      - "schemas/**"
      - "kairos/**"
      - ".github/workflows/logos.yml"
  pull_request:
    paths:
      - "services/logos/**"
      - "schemas/**"
      - "kairos/**"
      - ".github/workflows/logos.yml"

defaults:
  run:
    working-directory: services/logos

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            kairos/pyproject.toml
            services/logos/pyproject.toml

      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install logos + dev deps
        run: pip install -e ".[dev]"

      - name: pytest + coverage
        # Lean integration tests require a Lean 4 toolchain that isn't
        # installed in CI; they're already excluded from coverage via
        # pyproject [tool.coverage.run].omit and skipped here by path.
        run: |
          python -m pytest \
            --cov \
            --cov-report=term-missing \
            --ignore=tests/test_lean_session.py \
            --ignore=tests/test_lean_verifier.py \
            --ignore=tests/experiments \
            -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            kairos/pyproject.toml
            services/logos/pyproject.toml

      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install kairos
        working-directory: kairos
        run: pip install -e .

      - name: Install logos
        run: pip install -e ".[http]"

      - name: Install lint tools
        run: pip install ruff mypy

      - name: ruff
        run: python -m ruff check src/ tests/

      - name: mypy
        run: python -m mypy --strict src/

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    # Build context = repo root; validates Dockerfile + schemas + kairos COPY
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          docker build \
            -f services/logos/Dockerfile \
            -t logos:ci \
            .
