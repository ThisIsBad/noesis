name: theoria

# Theoria lives under ui/ — it's a human-facing client, not a service.
# We still run the full preflight gates so the 147 tests stay green.
# Frontend browser-smoke tests are a separate job that installs Chromium.

on:
  push:
    branches: [master]
    paths:
      - "ui/theoria/**"
      - "schemas/**"
      - ".github/workflows/theoria.yml"
  pull_request:
    paths:
      - "ui/theoria/**"
      - "schemas/**"
      - ".github/workflows/theoria.yml"

defaults:
  run:
    working-directory: ui/theoria

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            schemas/pyproject.toml
            ui/theoria/pyproject.toml

      # Theoria is zero-dep at runtime; noesis-schemas is needed for the
      # schemas-integration tests (otherwise they importorskip-out).
      - name: Install schemas
        working-directory: schemas
        run: pip install -e .

      - name: Install theoria + dev deps
        run: pip install -e ".[dev]"

      - name: pytest + coverage
        run: |
          python -m pytest \
            --cov=src/theoria \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            --ignore=tests/test_frontend.py \
            -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            ui/theoria/pyproject.toml

      - name: Install theoria
        run: pip install -e .

      - name: Install lint tools
        run: pip install ruff mypy

      - name: ruff
        run: python -m ruff check src/ tests/

      - name: mypy
        run: python -m mypy --strict src/

  frontend:
    name: Browser smoke tests (Playwright)
    runs-on: ubuntu-latest
    # Browser tests are slow-ish and depend on Chromium downloads. They
    # gate the UI layer against regressions that unit tests can't catch
    # (SVG render, SSE-driven refresh, node-click → details panel).

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            ui/theoria/pyproject.toml

      - name: Install theoria with frontend-tests extras
        run: pip install -e ".[dev,frontend-tests]"

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: pytest (frontend only)
        run: python -m pytest tests/test_frontend.py -v

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          docker build \
            -f ui/theoria/Dockerfile \
            -t theoria:ci \
            .
