name: theoria

# Theoria lives under ui/ — it's a human-facing client, not a service.
# We still run the full preflight gates so the 147 tests stay green.
# The reusable workflow handles test/lint/docker; the Playwright
# browser-smoke job is theoria-specific (Chromium install) and lives
# below.

on:
  push:
    branches: [master]
    paths:
      - "ui/theoria/**"
      - "schemas/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/theoria.yml"
  pull_request:
    paths:
      - "ui/theoria/**"
      - "schemas/**"
      - ".github/workflows/_python-component.yml"
      - ".github/workflows/theoria.yml"

jobs:
  ci:
    uses: ./.github/workflows/_python-component.yml
    with:
      service-path: ui/theoria
      service-name: theoria
      coverage-args: "--cov=src/theoria"
      needs-kairos: false           # theoria is zero-dep at runtime
      pytest-extra: "--ignore=tests/test_frontend.py"

  frontend:
    name: Browser smoke tests (Playwright)
    runs-on: ubuntu-latest
    # Theoria-specific: install Chromium and run the SVG/SSE/UI tests
    # that pytest skips when Playwright's browser binary is missing.

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ui/theoria/pyproject.toml

      - name: Install theoria with frontend-tests extras
        working-directory: ui/theoria
        run: pip install -e ".[dev,frontend-tests]"

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: pytest (frontend only)
        working-directory: ui/theoria
        run: python -m pytest tests/test_frontend.py -v
